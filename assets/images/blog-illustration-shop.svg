<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 650 400" role="img" aria-labelledby="title desc">
  <title id="title">Shopping Illustration</title>
  <desc id="desc">Abstract blog illustration with soft gradient background.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#c7dcee"/>
      <stop offset="1" stop-color="#677bd9"/>
    </linearGradient>
    <linearGradient id="screen" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#ffffff" stop-opacity="0.94"/>
      <stop offset="1" stop-color="#dfeaff" stop-opacity="0.92"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="16" stdDeviation="18" flood-color="#17306b" flood-opacity=".18"/>
    </filter>
  </defs>
  <rect width="650" height="400" rx="8" fill="url(#bg)"/>
  <circle cx="95" cy="55" r="145" fill="#ffffff" opacity=".20"/>
  <circle cx="565" cy="380" r="205" fill="#3157e8" opacity=".16"/>
  <path d="M0 288 C125 210 173 335 298 262 S520 230 650 152 V400 H0Z" fill="#ffffff" opacity=".13"/>

  <g transform="translate(68 46)">
    <circle cx="10" cy="10" r="6" fill="#00c8d7"/>
    <path d="M22 4 31 13 22 22 13 13Z" fill="#2978ff" opacity=".95"/>
    <text x="42" y="16" font-family="Arial, sans-serif" font-size="16" font-weight="700" fill="#07316e">Demo</text>
  </g>

  <g filter="url(#shadow)">
    <rect x="194" y="98" width="260" height="178" rx="18" fill="#14215f"/>
    <rect x="212" y="116" width="224" height="124" rx="8" fill="url(#screen)"/>
    <rect x="285" y="276" width="78" height="16" rx="8" fill="#14215f"/>
    <rect x="258" y="292" width="132" height="13" rx="7" fill="#23327b" opacity=".75"/>
  </g>

  <g transform="translate(230 135)">
    <rect x="0" y="0" width="104" height="72" rx="8" fill="#ffffff" opacity=".92"/>
    <rect x="13" y="13" width="78" height="8" rx="4" fill="#7aa1ff"/>
    <rect x="13" y="31" width="50" height="8" rx="4" fill="#c4d4ff"/>
    <rect x="13" y="49" width="70" height="8" rx="4" fill="#c4d4ff"/>
  </g>

  <g transform="translate(350 138)">
    <rect x="0" y="0" width="62" height="62" rx="12" fill="#2a76ff" opacity=".95"/>
    <path d="M25 20 L45 31 L25 42 Z" fill="#ffffff"/>
  </g>

  <g transform="translate(158 202)">
    <rect x="0" y="0" width="94" height="52" rx="12" fill="#ffffff" opacity=".82"/>
    <path d="M20 36 L36 22 L48 32 L61 16 L77 36 Z" fill="#58b7ff"/>
    <circle cx="27" cy="17" r="6" fill="#2978ff"/>
  </g>

  <g transform="translate(425 220)">
    <rect x="0" y="0" width="85" height="44" rx="12" fill="#ffffff" opacity=".74"/>
    <rect x="16" y="14" width="52" height="6" rx="3" fill="#2978ff" opacity=".72"/>
    <rect x="16" y="26" width="38" height="6" rx="3" fill="#7aa1ff" opacity=".7"/>
  </g>

  <g transform="translate(313 203)">
    <circle cx="0" cy="0" r="24" fill="#ffbb55"/>
    <path d="M-7 -3 h14 v19 h-14z" fill="#ffffff" opacity=".92"/>
    <path d="M-11 -3 h22" stroke="#ffffff" stroke-width="4" stroke-linecap="round" opacity=".92"/>
  </g>
</svg>